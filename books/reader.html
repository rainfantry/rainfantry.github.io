<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// FIELD MANUAL — 22DIV</title>
<meta name="robots" content="noindex, nofollow">
<script>
(function(){
  var c = document.cookie.indexOf('22div_gate_auth=1') > -1;
  var l = (function(){ try { return localStorage.getItem('22div_gate_auth') === '1'; } catch(e){ return false; } })();
  if (!c && !l) {
    var ret = encodeURIComponent(location.href);
    location.replace('https://rainfantry.github.io/22nd-survey-division/?unlock=1&ret=' + ret);
  }
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0c;--bg2:#111;--bg3:#161616;
  --green:#00ff41;--green2:#00cc33;--green3:#009922;
  --amber:#ffb000;--red:#ff4444;--cyan:#00e5ff;--blue:#4488ff;
  --dim:#555;--muted:#888;--text:#ccc;--bright:#eee;
  --mono:"Cascadia Code","Consolas","Source Code Pro","Courier New",monospace;
}
html{scroll-behavior:smooth;}
body{font-family:var(--mono);background:var(--bg);color:var(--text);line-height:1.75;min-height:100vh;}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,0.006) 3px,rgba(0,255,65,0.006) 4px);pointer-events:none;z-index:999;}
nav{position:sticky;top:0;background:rgba(12,12,12,0.96);backdrop-filter:blur(8px);border-bottom:1px solid #1a1a1a;z-index:100;padding:.6rem 0;}
nav .inner{max-width:920px;margin:0 auto;padding:0 1.5rem;display:flex;gap:1.2rem;align-items:center;flex-wrap:wrap;}
nav a{color:var(--green2);text-decoration:none;font-size:.75rem;letter-spacing:.06em;opacity:.8;transition:opacity .15s;}
nav a:hover{opacity:1;}
nav .brand{color:var(--green);font-weight:bold;font-size:.85rem;opacity:1;margin-right:auto;}
nav .ch-label{color:var(--dim);font-size:.7rem;letter-spacing:.08em;flex:1;text-align:center;}
.loader{max-width:920px;margin:4rem auto;padding:0 1.5rem;font-size:.82rem;letter-spacing:.12em;}
.loader-text{color:var(--dim);}
.cursor{display:inline-block;width:.6rem;height:1rem;background:var(--green3);animation:blink .9s step-end infinite;vertical-align:text-bottom;margin-left:.2rem;}
@keyframes blink{50%{opacity:0;}}
.err{color:var(--red);font-size:.8rem;padding:2rem 1.5rem;}
.doc{max-width:920px;margin:0 auto;padding:1.5rem 1.5rem 4rem;display:none;}
.doc-header{margin-bottom:1.8rem;padding-bottom:1rem;border-bottom:1px solid #1a1a1a;}
.doc-tag{font-size:.62rem;letter-spacing:.14em;color:var(--dim);margin-bottom:.3rem;}
.doc-title{font-size:1.15rem;color:var(--green);font-weight:400;letter-spacing:.06em;margin-bottom:.3rem;}
.doc-sub{font-size:.75rem;color:var(--dim);}

/* ── markdown rendering ── */
.md{font-size:.84rem;line-height:1.85;}
.md h1{color:var(--green);font-size:1.1rem;font-weight:400;letter-spacing:.06em;margin:2rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid #1a1a1a;}
.md h1:first-child{margin-top:0;}
.md h2{color:var(--amber);font-size:.98rem;font-weight:400;margin:1.8rem 0 .5rem;padding-bottom:.2rem;border-bottom:1px solid #1a1a1a;}
.md h3{color:var(--bright);font-size:.88rem;font-weight:400;margin:1.4rem 0 .4rem;}
.md h4{color:var(--green2);font-size:.82rem;font-weight:400;margin:1.2rem 0 .3rem;letter-spacing:.04em;}
.md p{color:var(--text);margin-bottom:.9rem;}
.md ul,.md ol{padding-left:1.4rem;margin-bottom:.9rem;}
.md li{margin-bottom:.25rem;color:var(--text);}
.md strong{color:var(--bright);}
.md em{color:var(--muted);font-style:italic;}
.md hr{border:none;border-top:1px solid #1a1a1a;margin:2rem 0;}
.md a{color:var(--cyan);text-decoration:none;border-bottom:1px dashed #2a6677;}
.md a:hover{opacity:.75;}
.md blockquote{border-left:3px solid var(--green3);padding:.5rem 1rem;margin:1rem 0;color:var(--muted);background:#040d04;}
.md blockquote p{margin-bottom:0;}
.md table{width:100%;border-collapse:collapse;font-size:.78rem;margin:1rem 0 1.5rem;}
.md th{text-align:left;color:var(--green2);padding:.4rem .8rem;border-bottom:1px solid var(--green3);font-weight:400;}
.md td{padding:.35rem .8rem;border-bottom:1px solid #161616;vertical-align:top;}
.md tr:hover td{background:#0a0a0a;}
.md code{background:#161616;color:#55ccff;padding:.1em .3em;font-size:.84em;border-radius:2px;}
.md pre{background:#090909;border:1px solid #1a1a1a;padding:1rem 1.2rem;margin:.8rem 0 1.4rem;overflow-x:auto;}
.md pre code{background:transparent;color:#abb2bf;padding:0;font-size:.77rem;line-height:1.65;}

/* ── hljs overrides ── */
.hljs{background:#090909 !important;}
.hljs-keyword{color:#c678dd;}
.hljs-string{color:#98c379;}
.hljs-number{color:#d19a66;}
.hljs-comment{color:#4a4a5a;font-style:italic;}
.hljs-function .hljs-title,.hljs-title.function_{color:#61afef;}
.hljs-title{color:#61afef;}
.hljs-attr,.hljs-attribute{color:#d19a66;}
.hljs-built_in{color:#56b6c2;}
.hljs-params{color:#abb2bf;}
.hljs-operator,.hljs-punctuation{color:#888;}
.hljs-variable{color:#e06c75;}
.hljs-literal{color:#d19a66;}
.hljs-type{color:#e5c07b;}
.hljs-meta{color:#61afef;}

/* ── progress bar ── */
.read-progress{position:fixed;top:0;left:0;height:2px;background:var(--green3);z-index:200;width:0%;transition:width .1s;}

/* ── nav buttons ── */
.ch-nav{display:flex;gap:.6rem;}
.ch-nav button{font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;padding:.25rem .7rem;border:1px solid #2a2a2a;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;}
.ch-nav button:hover{border-color:var(--green3);color:var(--green2);}
.ch-nav button:disabled{opacity:.2;cursor:default;}

/* ── language primer ── */
.primer{border:1px solid #0d1a2a;background:#04070a;margin:0 0 1.4rem;overflow:hidden;}
.primer-header{background:#080f18;padding:.4rem .9rem;font-size:.58rem;letter-spacing:.18em;color:#2a5a8e;border-bottom:1px solid #0d1a2a;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.primer-header span:first-child{color:#2a5a8e;}
.primer-langs{font-size:.55rem;letter-spacing:.1em;color:#3a7aae;}
.primer-toggle{font-size:.65rem;color:#2a5a8e;transition:transform .2s;}
.primer.open .primer-toggle{transform:rotate(90deg);}
.primer-body{display:none;padding:.6rem .9rem .8rem;}
.primer.open .primer-body{display:block;}
.primer-table{width:100%;border-collapse:collapse;font-size:.7rem;}
.primer-table tr+tr td{border-top:1px solid #0a1520;}
.primer-table td{padding:.35rem .5rem;vertical-align:top;line-height:1.55;}
.primer-table td:first-child{color:#5a9ad4;font-family:monospace;font-size:.68rem;white-space:nowrap;padding-right:1.2rem;min-width:160px;}
.primer-table td:nth-child(2){font-size:.6rem;letter-spacing:.1em;color:#2a5a8e;width:38px;padding-right:.8rem;white-space:nowrap;}
.primer-table td:last-child{color:#8aa8c4;}

/* ── mission briefing ── */
.sitrep{border:1px solid #001a00;background:#04090400;margin:0 0 2rem;overflow:hidden;}
.sitrep-header{background:#0a140a;padding:.4rem .9rem;font-size:.58rem;letter-spacing:.18em;color:#2a6e2a;border-bottom:1px solid #001a00;}
.sitrep-body{padding:.8rem .9rem;display:grid;grid-template-columns:5.5rem 1fr;row-gap:.45rem;font-size:.72rem;line-height:1.5;}
.sitrep-key{color:#2a6e2a;font-size:.6rem;letter-spacing:.14em;padding-top:.08rem;}
.sitrep-val{color:#aaa;}
.sitrep-val em{color:#ccc;font-style:normal;}
.sitrep-doctrine{border-top:1px solid #0d1a0d;margin-top:.4rem;padding-top:.4rem;grid-column:1/3;color:#3a7e3a;font-size:.65rem;letter-spacing:.08em;}

/* ── repo unlock block ── */
.repo-unlock{border:1px solid #1a1100;background:#080600;margin:0 0 1.4rem;overflow:hidden;}
.repo-unlock-header{background:#0f0a00;padding:.4rem .9rem;font-size:.58rem;letter-spacing:.18em;color:#886600;border-bottom:1px solid #1a1100;}
.repo-unlock-body{padding:.7rem .9rem;font-size:.72rem;line-height:1.6;}
.repo-unlock-repos{display:flex;flex-wrap:wrap;gap:.4rem;margin:.4rem 0 .6rem;}
.repo-tag{background:#100a00;border:1px solid #332200;color:#bb9900;font-size:.62rem;letter-spacing:.08em;padding:.15rem .55rem;}
.repo-unlock-price{color:#ffcc00;font-size:.8rem;letter-spacing:.04em;font-weight:400;}
.repo-unlock-cta{font-size:.65rem;color:#886600;margin-top:.35rem;}
.repo-unlock-cta a{color:#bb9900;text-decoration:none;border-bottom:1px solid #443300;}
.repo-unlock-cta a:hover{color:#ffcc00;}

/* ── exercise engine ── */
.ex-section-label{font-size:.6rem;letter-spacing:.16em;color:var(--dim);margin:2.5rem 0 .8rem;padding-top:1.2rem;border-top:1px solid #1a1a1a;}
.ex-block{margin:1.2rem 0;font-size:.8rem;}

/* terminal replay */
.ex-terminal{border:1px solid #003311;background:#060d06;overflow:hidden;}
.ex-terminal .ex-bar{background:#0a150a;padding:.35rem .9rem;font-size:.62rem;color:var(--dim);letter-spacing:.1em;display:flex;gap:.8rem;align-items:center;}
.ex-terminal .ex-bar span{color:var(--green3);}
.term-screen{padding:.9rem 1rem;min-height:72px;font-size:.75rem;line-height:1.7;font-family:var(--mono);}
.term-line{color:#00ff41;display:block;opacity:0;transition:opacity .08s;}
.term-line.show{opacity:1;}
.term-line.dim{color:var(--dim);}
.term-line.ok{color:var(--green);}
.term-line.err{color:var(--red);}
.ex-terminal .ex-controls{border-top:1px solid #0a1a0a;padding:.4rem .9rem;display:flex;gap:.6rem;}
.term-btn{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;padding:.2rem .65rem;border:1px solid #1a3a1a;background:transparent;color:var(--green3);cursor:pointer;transition:all .15s;}
.term-btn:hover{border-color:var(--green);color:var(--green);}
.term-btn:disabled{opacity:.3;cursor:default;}

/* MCQ */
.ex-mcq{border:1px solid #1e1e1e;background:#0d0d0d;padding:1rem 1.1rem;}
.ex-mcq .ex-tag{font-size:.6rem;letter-spacing:.12em;color:var(--amber);margin-bottom:.5rem;}
.ex-question{color:var(--bright);font-size:.82rem;line-height:1.6;margin-bottom:.9rem;}
.ex-choices{display:flex;flex-direction:column;gap:.4rem;}
.ex-choice{background:#111;border:1px solid #222;color:var(--text);padding:.45rem .8rem;cursor:pointer;text-align:left;font-family:var(--mono);font-size:.76rem;transition:all .12s;width:100%;}
.ex-choice:hover:not(:disabled){border-color:#004d18;color:var(--bright);}
.ex-choice.correct{border-color:var(--green)!important;color:var(--green)!important;background:#020d02;}
.ex-choice.wrong{border-color:var(--red)!important;color:var(--red)!important;background:#0d0202;}
.ex-feedback{font-size:.74rem;margin-top:.7rem;padding:.55rem .8rem;display:none;border-left:3px solid;}
.ex-feedback.show{display:block;}
.ex-feedback.fb-ok{color:var(--green2);border-color:var(--green3);background:#020d02;}
.ex-feedback.fb-err{color:#ff8888;border-color:var(--red);background:#0d0202;}

/* fill-in-blank */
.ex-fillin{border:1px solid #1e1e1e;background:#0d0d0d;padding:1rem 1.1rem;}
.ex-fillin .ex-tag{font-size:.6rem;letter-spacing:.12em;color:var(--cyan);margin-bottom:.5rem;}
.ex-prompt{color:var(--bright);font-size:.82rem;margin-bottom:.8rem;}
.ex-fillin pre{background:#090909;border:1px solid #141414;padding:.8rem 1rem;margin:.6rem 0 .8rem;overflow-x:auto;font-size:.74rem;line-height:1.7;}
.code-blank{background:#001200;border:none;border-bottom:1px solid var(--green3);color:var(--green);font-family:var(--mono);font-size:.74rem;padding:.05em .3em;min-width:10ch;width:auto;outline:none;transition:border-color .15s;}
.code-blank:focus{border-bottom-color:var(--green);}
.code-blank.fb-ok{border-color:var(--green);color:var(--green);}
.code-blank.fb-err{border-color:var(--red);color:var(--red);background:#0d0000;}
.ex-submit{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;padding:.25rem .75rem;border:1px solid #2a2a2a;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;margin-top:.3rem;}
.ex-submit:hover{border-color:var(--green3);color:var(--green2);}
.ex-hint{font-size:.7rem;color:var(--dim);cursor:pointer;margin-left:.8rem;text-decoration:underline dashed;}
.ex-hint:hover{color:var(--muted);}
</style>
</head>
<body>
<div class="read-progress" id="read-progress"></div>
<nav>
  <div class="inner">
    <a class="brand" href="../index.html">22DIV</a>
    <a href="javascript:history.back()">← BACK TO COURSE</a>
    <span class="ch-label" id="ch-label"></span>
    <div class="ch-nav">
      <button id="btn-prev" onclick="navChapter(-1)" disabled>◀ PREV</button>
      <button id="btn-next" onclick="navChapter(+1)" disabled>NEXT ▶</button>
    </div>
    <a href="../books.html" style="color:var(--dim);font-size:.7rem">all chapters →</a>
  </div>
</nav>

<div class="loader" id="loader">
  <div class="loader-text">// FETCHING FIELD MANUAL<span class="cursor"></span></div>
</div>
<div class="err" id="err" style="display:none"></div>

<div class="doc" id="doc">
  <div class="doc-header">
    <div class="doc-tag" id="doc-tag">// VADER-RCE FIELD MANUAL</div>
    <div class="doc-title" id="doc-title"></div>
    <div class="doc-sub" id="doc-sub"></div>
  </div>
  <div class="md" id="md-content"></div>
  <div style="margin-top:2.5rem;padding-top:1rem;border-top:1px solid #1a1a1a;display:flex;gap:1rem;">
    <button class="ch-nav" onclick="navChapter(-1)" id="btn-prev2" disabled style="font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;padding:.3rem .9rem;border:1px solid #2a2a2a;background:transparent;color:var(--dim);cursor:pointer;">◀ PREV CHAPTER</button>
    <button class="ch-nav" onclick="navChapter(+1)" id="btn-next2" disabled style="font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;padding:.3rem .9rem;border:1px solid #2a2a2a;background:transparent;color:var(--dim);cursor:pointer;">NEXT CHAPTER ▶</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const CHAPTERS = {
  1:'01_HEAP_INTERNALS',2:'02_OVERFLOW_PATTERNS',3:'03_UAF_TYPE_CONFUSION',
  4:'04_MITIGATIONS',5:'05_FUZZING_THEORY',6:'06_CRASH_TRIAGE',
  7:'07_EXPLOIT_PRIMITIVES',8:'08_TARGET_REVERSING',9:'09_HARNESS_ENGINEERING',
  10:'10_CORPUS_DICTIONARY',11:'11_CAMPAIGN_MANAGEMENT',12:'12_EXPLOIT_DEVELOPMENT',
  13:'13_0X1SECURITY_DOCTRINE',14:'14_CASE_STUDIES',15:'15_POST_EXPLOITATION',
  16:'16_RESPONSIBLE_DISCLOSURE',17:'17_NETWORK_WARFARE',18:'18_CRYPTOGRAPHY_EVASION',
  19:'19_LIVING_OFF_THE_LAND',
  20:'20_ACTIVE_DIRECTORY',21:'21_WEB_APPLICATION_WARFARE',22:'22_OSINT_SOCIAL_ENGINEERING',
  101:'01_OFFENSIVE_MINDSET',102:'02_RECON_FOOTPRINTING',103:'03_VULNERABILITY_RESEARCH',
  105:'05_EXPLOIT_DEVELOPMENT',106:'06_WINDOWS_INTERNALS',
  108:'08_PRIVILEGE_ESCALATION',109:'09_MALWARE_DEVELOPMENT',110:'10_CODE_INJECTION',
  111:'11_ROOTKITS',112:'12_ANTIVIRUS_EVASION',113:'13_MEMORY_FORENSICS',
  114:'14_REVERSE_ENGINEERING',116:'16_COMMAND_AND_CONTROL',121:'21_MOBILE_SECURITY'
};
const CHAPTER_TITLES = {
  1:'Heap Internals',2:'Overflow Patterns',3:'UAF & Type Confusion',
  4:'Mitigations',5:'Fuzzing Theory',6:'Crash Triage',
  7:'Exploit Primitives',8:'Target Reversing',9:'Harness Engineering',
  10:'Corpus & Dictionary',11:'Campaign Management',12:'Exploit Development',
  13:'0x1security Doctrine',14:'Case Studies',15:'Post-Exploitation',
  16:'Responsible Disclosure',17:'Network Warfare',18:'Cryptography & Evasion',
  19:'Living Off The Land',
  20:'Active Directory Warfare',21:'Web Application Warfare',22:'OSINT & Social Engineering',
  101:'Offensive Mindset',102:'Recon & Footprinting',103:'Vulnerability Research',
  105:'Exploit Development',106:'Windows Internals',
  108:'Privilege Escalation',109:'Malware Development',110:'Code Injection',
  111:'Rootkits',112:'AV Evasion',113:'Memory Forensics',
  114:'Reverse Engineering',116:'Command & Control',121:'Mobile Security'
};
const BOOK_TO_NUM = Object.fromEntries(Object.entries(CHAPTERS).map(([n,b])=>[b,+n]));
const NUM_ORDER = Object.keys(CHAPTERS).map(Number).sort((a,b)=>a-b);

let currentSlug = '';
let currentNum = 0;

function slugToTitle(slug){
  return slug.replace(/^\d+_/,'').replace(/_/g,' ');
}

function updateNav(num){
  const idx = NUM_ORDER.indexOf(num);
  const hasPrev = idx > 0;
  const hasNext = idx < NUM_ORDER.length - 1;
  ['btn-prev','btn-prev2'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){ b.disabled=!hasPrev; b.style.opacity=hasPrev?'1':'.2'; b.style.cursor=hasPrev?'pointer':'default'; }
  });
  ['btn-next','btn-next2'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){ b.disabled=!hasNext; b.style.opacity=hasNext?'1':'.2'; b.style.cursor=hasNext?'pointer':'default'; }
  });
}

function navChapter(dir){
  const idx = NUM_ORDER.indexOf(currentNum);
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= NUM_ORDER.length) return;
  const newNum = NUM_ORDER[newIdx];
  loadBook(CHAPTERS[newNum]);
}

function loadBook(slug){
  document.getElementById('loader').style.display='block';
  document.getElementById('doc').style.display='none';
  document.getElementById('err').style.display='none';
  window.scrollTo(0,0);

  currentSlug = slug;
  currentNum = BOOK_TO_NUM[slug] || 0;
  const title = slugToTitle(slug);
  document.title = `// ${title} — 22DIV FIELD MANUAL`;

  const chNum = currentNum;
  document.getElementById('ch-label').textContent = chNum ? `Ch ${String(chNum).padStart(2,'0')} / 22` : '';
  if(chNum) updateNav(chNum);

  history.replaceState(null,'','reader.html?b='+slug);

  fetch('./' + slug + '.md')
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status+' — chapter not found'); return r.text(); })
    .then(md=>{
      document.getElementById('loader').style.display='none';

      document.getElementById('doc-tag').textContent = chNum ? `// FIELD MANUAL — CHAPTER ${String(chNum).padStart(2,'0')}` : '// FIELD MANUAL';
      document.getElementById('doc-title').textContent = title.replace(/_/g,' ');
      document.getElementById('doc-sub').textContent = chNum && CHAPTER_TITLES[chNum] ? CHAPTER_TITLES[chNum] : '';

      const contentEl = document.getElementById('md-content');
      contentEl.innerHTML = typeof marked === 'function'
        ? marked(md)
        : marked.parse(md, {gfm:true, breaks:true});

      // strip the first h1 (already in the doc-header)
      const firstH1 = contentEl.querySelector('h1');
      if(firstH1) firstH1.remove();

      // syntax highlight all code blocks
      contentEl.querySelectorAll('pre code').forEach(block=>{
        try{ hljs.highlightElement(block); }catch(e){}
      });

      document.getElementById('doc').style.display='block';
      if(chNum) updateNav(chNum);

      // load mission briefing, repo unlock, language primer, exercises
      loadSitrep(slug, contentEl);
      loadRepo(slug, contentEl);
      loadPrimer(slug, contentEl);
      loadExercises(slug, contentEl);
    })
    .catch(e=>{
      document.getElementById('loader').style.display='none';
      document.getElementById('err').style.display='block';
      document.getElementById('err').textContent = '// ERROR: ' + e.message;
    });
}

// read scroll progress
window.addEventListener('scroll', ()=>{
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('read-progress').style.width = Math.min(pct,100) + '%';
});

// ── Exercise Engine ──────────────────────────────────────────────────────────

var _primers = null;
function loadPrimer(slug, container) {
  function inject(data) {
    var p = data[slug];
    if (!p || !p.entries || !p.entries.length) return;
    var langs = p.languages ? p.languages.join(' &nbsp;•&nbsp; ') : '';
    var rows = p.entries.map(function(e) {
      return '<tr><td>' + e.term + '</td><td>' + (e.lang || '') + '</td><td>' + e.meaning + '</td></tr>';
    }).join('');
    var el = document.createElement('div');
    el.className = 'primer';
    el.innerHTML =
      '<div class="primer-header">' +
        '<span>// LANGUAGE PRIMER</span>' +
        '<span class="primer-langs">' + langs + '</span>' +
        '<span class="primer-toggle">&#9658;</span>' +
      '</div>' +
      '<div class="primer-body">' +
        '<table class="primer-table">' + rows + '</table>' +
      '</div>';
    el.querySelector('.primer-header').addEventListener('click', function() {
      el.classList.toggle('open');
    });
    var sitrep = container.querySelector('.sitrep');
    if (sitrep && sitrep.nextSibling) {
      container.insertBefore(el, sitrep.nextSibling);
    } else if (sitrep) {
      container.appendChild(el);
    } else {
      container.insertBefore(el, container.firstChild);
    }
  }
  if (_primers) { inject(_primers); return; }
  fetch('./primers.json')
    .then(function(r){ return r.json(); })

const ExEngine = {
  render(exercises, container) {
    const wrap = document.createElement('div');
    wrap.innerHTML = '<div class="ex-section-label">// DRILL — INTERACTIVE EXERCISES</div>';
    exercises.forEach((ex, i) => {
      const el = document.createElement('div');
      el.className = 'ex-block';
      if (ex.type === 'terminal')  el.appendChild(ExEngine.buildTerminal(ex, i));
      else if (ex.type === 'mcq')  el.appendChild(ExEngine.buildMCQ(ex, i));
      else if (ex.type === 'fillin') el.appendChild(ExEngine.buildFillIn(ex, i));
      wrap.appendChild(el);
    });
    container.appendChild(wrap);
  },

  buildTerminal(ex, idx) {
    const d = document.createElement('div');
    d.className = 'ex-terminal';
    d.innerHTML = `<div class="ex-bar"><span>▶ TERMINAL</span> ${ex.title || ''}</div>
      <div class="term-screen" id="ts-${idx}"></div>
      <div class="ex-controls">
        <button class="term-btn" id="tb-${idx}">▶ PLAY</button>
        <button class="term-btn" id="tr-${idx}" disabled>↺ REPLAY</button>
      </div>`;
    const screen = d.querySelector('#ts-' + idx);
    const playBtn = d.querySelector('#tb-' + idx);
    const replayBtn = d.querySelector('#tr-' + idx);
    let timer = null;

    function run() {
      screen.innerHTML = '';
      playBtn.disabled = true;
      replayBtn.disabled = true;
      let delay = 0;
      (ex.frames || []).forEach(f => {
        delay += (f.delay || 300);
        timer = setTimeout(() => {
          const line = document.createElement('span');
          line.className = 'term-line ' + (f.cls || '');
          line.textContent = f.text;
          screen.appendChild(line);
          setTimeout(() => line.classList.add('show'), 20);
          screen.scrollTop = screen.scrollHeight;
        }, delay);
      });
      setTimeout(() => { replayBtn.disabled = false; }, delay + 400);
    }

    playBtn.addEventListener('click', () => { run(); playBtn.style.display = 'none'; });
    replayBtn.addEventListener('click', () => { run(); });
    return d;
  },

  buildMCQ(ex, idx) {
    const d = document.createElement('div');
    d.className = 'ex-mcq';
    const choicesHtml = (ex.choices || []).map((c, i) =>
      `<button class="ex-choice" data-idx="${i}">${c}</button>`).join('');
    d.innerHTML = `<div class="ex-tag">// MCQ</div>
      <div class="ex-question">${ex.question}</div>
      <div class="ex-choices">${choicesHtml}</div>
      <div class="ex-feedback" id="ef-${idx}"></div>`;
    const fb = d.querySelector('#ef-' + idx);
    d.querySelectorAll('.ex-choice').forEach(btn => {
      btn.addEventListener('click', () => {
        const chosen = +btn.dataset.idx;
        const correct = ex.answer;
        d.querySelectorAll('.ex-choice').forEach(b => b.disabled = true);
        if (chosen === correct) {
          btn.classList.add('correct');
          fb.textContent = '✓ CORRECT — ' + (ex.explanation || '');
          fb.className = 'ex-feedback show fb-ok';
        } else {
          btn.classList.add('wrong');
          d.querySelectorAll('.ex-choice')[correct].classList.add('correct');
          fb.textContent = '✗ WRONG — ' + (ex.explanation || '');
          fb.className = 'ex-feedback show fb-err';
        }
      });
    });
    return d;
  },

  buildFillIn(ex, idx) {
    const d = document.createElement('div');
    d.className = 'ex-fillin';
    const code = (ex.code || '').replace(/\[BLANK\]/g,
      `<input class="code-blank" id="fb-input-${idx}" placeholder="${ex.hint || '?'}" autocomplete="off" spellcheck="false">`);
    d.innerHTML = `<div class="ex-tag">// FILL IN THE BLANK</div>
      <div class="ex-prompt">${ex.prompt}</div>
      <pre>${code}</pre>
      <button class="ex-submit" id="fb-btn-${idx}">CHECK →</button>
      <span class="ex-hint" id="fb-hint-${idx}">hint</span>
      <div class="ex-feedback" id="fb-fb-${idx}"></div>`;
    const input = d.querySelector('#fb-input-' + idx);
    const btn   = d.querySelector('#fb-btn-' + idx);
    const hintEl = d.querySelector('#fb-hint-' + idx);
    const fb    = d.querySelector('#fb-fb-' + idx);
    const answers = Array.isArray(ex.answers) ? ex.answers : [ex.answer];

    function check() {
      const val = (input.value || '').trim();
      const ok = answers.some(a => val.toLowerCase() === String(a).toLowerCase());
      input.className = 'code-blank ' + (ok ? 'fb-ok' : 'fb-err');
      fb.textContent = ok
        ? '✓ CORRECT — ' + (ex.explanation || 'Exactly right.')
        : '✗ Try again. ' + (ex.wrong_hint || '');
      fb.className = 'ex-feedback show ' + (ok ? 'fb-ok' : 'fb-err');
      if (ok) { btn.disabled = true; input.disabled = true; }
    }

    btn.addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    hintEl.addEventListener('click', () => {
      fb.textContent = '// HINT: ' + (ex.hint || ex.answer);
      fb.className = 'ex-feedback show fb-err';
    });
    return d;
  }
};
